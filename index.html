<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kansah Games</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header {
  text-align:center;
  padding:30px;
  background:linear-gradient(135deg,#020617,#1e3a8a);
}

header h1 {font-size:40px;margin:0;}
header p {color:#cbd5e1;}

.container {
  padding:20px;
  max-width:1000px;
  margin:auto;
}

.input-box {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin-bottom:20px;
}

.input-box input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:10px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.price {
  color:#38bdf8;
  font-weight:bold;
  margin:10px 0;
}

button {
  background:#22c55e;
  border:none;
  padding:10px 20px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  transform:scale(1.05);
}

.tabs {
  text-align:center;
  margin-bottom:15px;
}

.tabs button {
  margin:5px;
  background:#334155;
}

.active {
  background:#2563eb !important;
}

.hidden {
  display:none;
}
</style>
</head>

<body>

<header>
  <h1>Kansah Games</h1>
  <p>Topup Murah & Cepat</p>
</header>

<div class="container">

<div class="input-box">
  <b>Masukkan Data Game</b>
  <input id="id" placeholder="Masukkan ID Game">
  <input id="server" placeholder="Server (opsional)">
</div>

<div class="tabs">
  <button class="active" onclick="show('ml',this)">MLBB</button>
  <button onclick="show('ff',this)">Free Fire</button>
  <button onclick="show('pubg',this)">PUBG</button>
</div>

<!-- ML -->
<div id="ml" class="grid">
  <div class="card">
    86 Diamond
    <div class="price">Rp20.000</div>
    <button onclick="order('MLBB 86 Diamond','20000')">Beli</button>
  </div>

  <div class="card">
    172 Diamond
    <div class="price">Rp40.000</div>
    <button onclick="order('MLBB 172 Diamond','40000')">Beli</button>
  </div>
</div>

<!-- FF -->
<div id="ff" class="grid hidden">
  <div class="card">
    70 Diamond
    <div class="price">Rp10.000</div>
    <button onclick="order('Free Fire 70 Diamond','10000')">Beli</button>
  </div>

  <div class="card">
    140 Diamond
    <div class="price">Rp20.000</div>
    <button onclick="order('Free Fire 140 Diamond','20000')">Beli</button>
  </div>
</div>

<!-- PUBG -->
<div id="pubg" class="grid hidden">
  <div class="card">
    60 UC
    <div class="price">Rp15.000</div>
    <button onclick="order('PUBG 60 UC','15000')">Beli</button>
  </div>
</div>

</div>

<script>
function show(id,btn){
  document.querySelectorAll('.grid').forEach(e=>e.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');

  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function order(nama,harga){
  let id=document.getElementById('id').value;
  let server=document.getElementById('server').value;

  if(!id){
    alert('Isi ID dulu bro 😅');
    return;
  }

  let pesan=`Halo Admin Kansah Games,
Saya mau order:

Produk: ${nama}
Harga: Rp${harga}
ID: ${id}
Server: ${server}`;

  window.location.href="https://wa.me/6281262409473?text="+encodeURIComponent(pesan);
}
</script>

</body>
</html>
