<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kansah Games</title>
<style>
body {font-family: Arial; background:#0f172a; color:white; text-align:center;}
.card {background:#1e293b; padding:20px; margin:10px; border-radius:10px;}
button {padding:10px 20px; background:#22c55e; border:none; color:white; border-radius:5px;}
</style>
</head>
<body>

<h1>Kansah Games</h1>
<p>Topup Game Murah & Otomatis</p>

<div class="card">
<h2>MLBB Diamond</h2>
<p>86 Diamond - Rp20.000</p>
<button onclick="order('ML 86 Diamond',20000)">Beli</button>
</div>

<script>
function order(nama,harga){
    let id = prompt("Masukkan ID Game:");
    let server = prompt("Masukkan Server:");

    let pesan = `Halo, saya mau order\nProduk: ${nama}\nHarga: Rp${harga}\nID: ${id} (${server})`;

    let wa = "https://wa.me/6281234567890?text=" + encodeURIComponent(pesan);
    window.location.href = wa;
}
</script>

</body>
</html>
